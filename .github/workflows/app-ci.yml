name: App CI

on:
  push:
    branches: [master]
    paths: ['**/*.csproj', '**/*.cs', 'Directory.Packages.props', 'Directory.Build.props', '.github/workflows/app-ci.yml']
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    paths: ['**/*.csproj', '**/*.cs', 'Directory.Packages.props', 'Directory.Build.props', '.github/workflows/app-ci.yml']

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build OnlyR.slnx --configuration Release

      - name: Test
        run: dotnet test --project OnlyR.Tests/OnlyR.Tests.csproj --configuration Release --no-build --report-trx --report-trx-filename test-results.trx --results-directory ./test-results

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./test-results
