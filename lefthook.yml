# https://lefthook.dev
# Auto-formats staged C# files against .editorconfig before each commit.
# Runs the full `dotnet format` (whitespace + style + analyzers) on staged
# files, consistent with TreatWarningsAsErrors, so style and analyzer fixes
# are applied at commit time.

pre-commit:
  commands:
    format:
      glob: "*.cs"
      run: dotnet format OnlyR.slnx --include {staged_files}
      stage_fixed: true
